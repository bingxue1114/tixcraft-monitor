name: Tixcraft Monitor

on:
  schedule:
    - cron: "*/1 * * * *"

  workflow_dispatch:

jobs:
  run-monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: pip install -r requirements.txt

      - name: Run Monitor
        env:
          LINE_TOKEN: ${{ secrets.LINE_TOKEN }}
        run: python monitor.py
